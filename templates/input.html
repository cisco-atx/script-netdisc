<!-- =========================
     Netdisc Styles
     ========================= -->
<style>
    /* Container holding both Devices and Diagnostics sections */
    .netdisc-container {
      display: flex;
      gap: 20px;
      width: 100%;
      box-sizing: border-box;
    }

    /* Individual column for each section */
    .netdisc-column {
      display: flex;
      flex: 1;
      flex-direction: column;
      min-width: 0;
    }

    /* Section headings */
    .netdisc-column h4 {
      margin: 6px;
    }

    /* Textarea for device input */
    .devices-textarea {
      height: 500px;
      resize: none;
      line-height: 2;
    }

    /* Grid layout for diagnostics checkboxes */
    .diagnostics-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      width: 100%;
      margin-top: 6px;
      box-sizing: border-box;
      justify-items: start;
      align-items: start;
    }

    /* Individual checkbox item */
    .diag-item {
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
</style>

<!-- =========================
     Netdisc Container
     ========================= -->
<div class="netdisc-container">

    <!-- =========================
         Devices Section
         ========================= -->
    <section class="netdisc-column">
        <h4>Devices</h4>

        <!-- Textarea for entering device hostnames -->
        <textarea
                class="devices-textarea"
                id="devices"
                name="devices"
                rows="8"
                placeholder="router1.example.com&#10;router2.example.com"
                required
        ></textarea>
    </section>

    <!-- =========================
         Diagnostics Section
         ========================= -->
    <section class="netdisc-column">
        <h4>Diagnostics</h4>

        <!-- Grid of diagnostic options -->
        <div class="diagnostics-grid">

            <!-- Interface -->
            <label class="diag-item">
                <input type="checkbox" name="interface" checked>
                Interface
            </label>

            <!-- MAC -->
            <label class="diag-item">
                <input type="checkbox" name="mac" checked>
                MAC
            </label>

            <!-- ARP -->
            <label class="diag-item">
                <input type="checkbox" name="arp" checked>
                ARP
            </label>

            <!-- CDP / LLDP -->
            <label class="diag-item">
                <input type="checkbox" name="cdp_lldp" checked>
                CDP / LLDP
            </label>

            <!-- VLANs -->
            <label class="diag-item">
                <input type="checkbox" name="vlans" checked>
                VLANs
            </label>

            <!-- Switchport -->
            <label class="diag-item">
                <input type="checkbox" name="switchport" checked>
                Switchport
            </label>

            <!-- IP Interface -->
            <label class="diag-item">
                <input type="checkbox" name="ip_interface" checked>
                IP Interface
            </label>

            <!-- Routing -->
            <label class="diag-item">
                <input type="checkbox" name="routing" checked>
                Routing
            </label>

            <!-- Inventory -->
            <label class="diag-item">
                <input type="checkbox" name="inventory" checked>
                Inventory
            </label>

            <!-- Config -->
            <label class="diag-item">
                <input type="checkbox" name="config" checked>
                Config
            </label>

        </div>
    </section>

</div>
